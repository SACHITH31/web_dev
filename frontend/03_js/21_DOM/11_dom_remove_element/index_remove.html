<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOM Remove Elements</title>
</head>

<body>

<!--
This file is used to understand how JavaScript removes elements from the DOM.

We will:

- remove specific elements
- remove last element
- remove all elements

Removing elements is important in real apps like:
- deleting tasks
- removing messages
- updating UI dynamically
-->

<h1>Remove Elements Example</h1>

<ul id="list">

<li class="item">Item 1</li>
<li class="item">Item 2</li>
<li class="item">Item 3</li>

</ul>

<button id="removeLast">Remove Last Item</button>
<button id="removeFirst">Remove First Item</button>
<button id="removeAll">Remove All Items</button>

<script src="script_remove.js"></script>

</body>
</html>
