<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOM Events Learning</title>
</head>

<body>

<!--
This file demonstrates how JavaScript handles events.

Event means:
Something that happens in the browser.

Examples:
- clicking a button
- typing in input
- moving mouse

We will use JavaScript to respond to these actions.
-->

<h1>DOM Events Example</h1>

<!-- Button click event -->
<button id="clickBtn">Click Me</button>

<!-- Input event -->
<br><br>
<input type="text" id="nameInput" placeholder="Type something">

<p id="output"></p>

<!-- Mouse events -->
<div id="box" style="width:200px;height:100px;background-color:lightgray;margin-top:20px;">
Hover over me
</div>

<script src="script.js"></script>

</body>
</html>
