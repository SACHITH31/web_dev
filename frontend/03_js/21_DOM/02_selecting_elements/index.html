<!-- 
==================================================================
DOM SELECTING ELEMENTS PRACTICE PAGE
==================================================================

This HTML page is used to demonstrate how JavaScript selects
different elements from the DOM.

DOM = Document Object Model

When a browser loads an HTML page, it converts the HTML
structure into a tree-like object structure.

JavaScript can access this structure using the "document" object.

Example DOM structure for this page:

document
 └── html
      └── body
           ├── h1
           ├── p
           ├── div
           ├── ul
           │    ├── li
           │    ├── li
           │    └── li
           └── button

JavaScript will select these elements using different
DOM selection methods.
-->

<h1 id="main-title">DOM Selection Learning</h1>

<p class="description">
This paragraph explains DOM selection methods.
</p>
