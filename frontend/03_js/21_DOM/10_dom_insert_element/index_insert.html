<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DOM Insert Elements</title>
</head>

<body>

<!--
This file demonstrates different ways to insert elements in the DOM.

We will learn:

- append()
- prepend()
- before()
- after()

These methods allow us to control where new elements are placed.
-->

<h1>Insert Elements Example</h1>

<div id="container">

<p id="reference">This is the reference element</p>

</div>

<button id="appendBtn">Append</button>
<button id="prependBtn">Prepend</button>
<button id="beforeBtn">Before</button>
<button id="afterBtn">After</button>

<button class="sampleBtn">sample</button>
<script src="script.js"></script>

</body>
</html>
